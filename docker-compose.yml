# Local dev services: Postgres (with pgvector for embeddings) + Redis.
# The Next.js app runs on the host (pnpm dev) and connects to these.
#
#   docker compose up -d          # start Postgres + Redis
#   pnpm db:migrate               # apply schema to the local DB
#   docker compose down           # stop (add -v to also wipe data)
services:
  db:
    # pgvector image: Postgres 16 with the `vector` extension available.
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag
    ports:
      # Host 5433 to avoid clashing with a Postgres already on 5432.
      - "5433:5432"
    volumes:
      - rag-pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      # Host 6380 to avoid clashing with a Redis already on 6379.
      - "6380:6379"
    volumes:
      - rag-redisdata:/data

volumes:
  rag-pgdata:
  rag-redisdata:
